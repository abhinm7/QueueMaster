version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./server/.env
    ports:  
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run seed && node dist/main"

  client:
    build:
      context: ./client
    ports:
      - "8080:80"
    env_file:
      - ./client/.env 
    depends_on:
      - server
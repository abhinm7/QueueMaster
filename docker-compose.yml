version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./server/.env
    ports:  
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      target: builder
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    volumes:
      # Aligned with WORKDIR /app in your Dockerfile
      - ./server:/app      
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  client:
    build:
      context: ./client
      target: builder
    ports:
      # Assuming Vite dev server (5173). If using React App/Next, change to 3000:3000 or 8080:8080.
      - "5173:5173"
    env_file:
      - ./client/.env 
    volumes:
      # Mounted source code to enable CHOKIDAR polling / hot-reload
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    command: npm run dev -- --host  
    environment:
      - CHOKIDAR_USEPOLLING=true

# Named volumes for state persistence
volumes:
  postgres_data:
  redis_data: